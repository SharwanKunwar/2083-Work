<!DOCTYPE html>
<html>

<head>
    <title>Hyperlink Demo</title>
</head>

<body>

    <h1 align="center">Hyperlink Demonstration</h1>

    <hr>

    <!-- Internal Hyperlink -->
    <h2>Internal Hyperlink</h2>

    <p>
        <a href="#about">Go to About Section</a>
    </p>

    <hr>

    <!-- Local Hyperlink -->
    <h2>Local Hyperlink</h2>

    <p>
        <a href="registration.html">Open Registration Page</a>
    </p>

    <hr>

    <!-- External Hyperlink -->
    <h2>External Hyperlink</h2>

    <p>
        <a href="https://www.google.com" target="_blank">
            Visit Google
        </a>
    </p>

    <hr><br><br><br><br><br><br><br><br><br><br>

    <!-- About Section -->
    <h2 id="about">About Section</h2>

    <p>
        This section is opened using an internal hyperlink.
    </p>

</body>

</html>
